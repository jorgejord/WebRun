<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Sandbox Viewer</title>

<style>
:root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --bg: #f1f5f9;
    --card-bg: #ffffff;
    --text: #1e293b;
    --subtext: #64748b;
    --border: #e2e8f0;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    color: var(--text);
}

.wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 950px;
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    padding: 30px;
}

h1 {
    margin-top: 0;
    text-align: center;
    font-size: 28px;
}

.notice {
    text-align: center;
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 25px;
}

.upload-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    transition: 0.3s;
    background-color: #f8fafc;
}

.upload-area:hover {
    border-color: var(--primary);
    background-color: #eef2ff;
}

input[type="file"] {
    display: none;
}

.upload-btn {
    padding: 10px 20px;
    border-radius: 8px;
    background-color: var(--primary);
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.upload-btn:hover {
    background-color: var(--primary-hover);
}

.filename {
    font-size: 13px;
    color: var(--subtext);
}

.viewer-container {
    margin-top: 25px;
}

iframe {
    width: 100%;
    height: 600px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: white;
}

.footer-note {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: var(--subtext);
}
</style>
</head>

<body>

<div class="wrapper">
<div class="card">

    <h1>HTML Sandbox Viewer</h1>

    <p class="notice">
        อ่านไฟล์จากเครื่องของคุณเท่านั้น ไม่มีการอัปโหลดหรือจัดเก็บข้อมูลบนเซิร์ฟเวอร์
    </p>

    <div class="upload-area">
        <label class="upload-btn" for="fileInput">เลือกไฟล์ HTML</label>
        <input type="file" id="fileInput" accept=".html">
        <div class="filename" id="filename">ยังไม่ได้เลือกไฟล์</div>
    </div>

    <div class="viewer-container">
        <iframe id="viewer"
            sandbox="allow-scripts"
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <div class="footer-note">
        ระบบทำงานแบบ Sandbox แยกบริบทเพื่อความปลอดภัย
    </div>

</div>
</div>

<script>
const input = document.getElementById("fileInput");
const viewer = document.getElementById("viewer");
const filenameText = document.getElementById("filename");

input.addEventListener("change", function(event) {
    const file = event.target.files[0];

    if (!file) {
        alert("กรุณาเลือกไฟล์ HTML");
        return;
    }

    if (!file.name.endsWith(".html")) {
        alert("อนุญาตเฉพาะไฟล์ .html เท่านั้น");
        input.value = "";
        filenameText.textContent = "ยังไม่ได้เลือกไฟล์";
        return;
    }

    filenameText.textContent = "ไฟล์ที่เลือก: " + file.name;

    const reader = new FileReader();

    reader.onload = function(e) {
        const blob = new Blob([e.target.result], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        viewer.src = url;
    };

    reader.readAsText(file);
});
</script>

</body>
</html>
